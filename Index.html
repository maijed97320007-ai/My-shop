<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>صورة المنتج - البحث عن المزود</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; margin:0; background:#121212; color:#fff; }
    .header { background:#1f1f1f; padding:15px; text-align:center; font-size:20px; font-weight:700; }
    .search-box { padding:20px; background:#1f1f1f; }
    input { width:100%; padding:15px; border:none; border-radius:12px; font-size:18px; background:#2a2a2a; color:#fff; }
    button { width:100%; margin-top:10px; padding:15px; background:#0088cc; color:#fff; border:none; border-radius:12px; font-size:18px; font-weight:600; }
    .results { padding:15px; }
    .card { background:#1f1f1f; border-radius:16px; margin-bottom:15px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
    .card img { width:100%; height:220px; object-fit:cover; }
    .card-body { padding:15px; }
    .title { font-size:18px; font-weight:600; margin-bottom:8px; }
    .rating { color:#ffcc00; font-size:20px; }
    .price { font-size:22px; font-weight:700; color:#00ff9d; margin:8px 0; }
    .supplier { background:#2a2a2a; padding:8px 12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .contact-btn { background:#00ff9d; color:#000; padding:8px 16px; border-radius:8px; font-weight:700; cursor:pointer; }
    .empty { text-align:center; padding:40px; color:#888; }
  </style>
</head>
<body>
  <div class="header">📸 صورة المنتج • ابحث عن المزود</div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن المنتج... (مثال: iphone, watch, laptop)">
    <button onclick="searchProduct()">🔍 ابحث الآن</button>
  </div>

  <div id="results" class="results"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor("#121212");
    tg.setBackgroundColor("#121212");

    // مزودين وهميين (يمكنك تغييرهم لاحقًا بمزودين حقيقيين)
    const suppliers = [
      { name: "AliExpress - الصين", contact: "https://t.me/AliExpress_Oman" },
      { name: "Amazon Global", contact: "https://t.me/AmazonSupplier_OM" },
      { name: "مزود محلي عمان", contact: "https://t.me/OmanSupplier2026" },
      { name: "Shein Official", contact: "https://t.me/Shein_Oman" }
    ];

    async function searchProduct() {
      const query = document.getElementById('searchInput').value.trim();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="empty">جاري البحث... ⏳</div>';

      if (!query) {
        resultsDiv.innerHTML = '<div class="empty">اكتب اسم المنتج أولاً 😊</div>';
        return;
      }

      try {
        // استخدام DummyJSON API (مجاني 100% وسريع)
        const res = await fetch(`https://dummyjson.com/products/search?q=${encodeURIComponent(query)}&limit=6`);
        const data = await res.json();

        if (!data.products || data.products.length === 0) {
          resultsDiv.innerHTML = `<div class="empty">لا يوجد نتائج لـ "${query}"<br>جرب كلمات أخرى مثل: phone, shoes, bag</div>`;
          return;
        }

        let html = '';
        data.products.forEach(product => {
          const supplier = suppliers[Math.floor(Math.random() * suppliers.length)];
          const stars = '⭐'.repeat(Math.floor(product.rating)) + '☆'.repeat(5 - Math.floor(product.rating));

          html += `
            <div class="card">
              <img src="${product.thumbnail}" alt="${product.title}">
              <div class="card-body">
                <div class="title">${product.title}</div>
                <div class="rating">${stars} (${product.rating})</div>
                <div class="price">$${product.price} <small style="color:#aaa;">(السعر المناسب)</small></div>
                <div class="supplier">
                  <span>📦 ${supplier.name}</span>
                  <span onclick="contactSupplier('${supplier.contact}', '${product.title}')" class="contact-btn">تواصل الآن</span>
                </div>
              </div>
            </div>`;
        });

        resultsDiv.innerHTML = html;
      } catch (e) {
        resultsDiv.innerHTML = `<div class="empty">حدث خطأ في البحث<br>جرب مرة أخرى</div>`;
      }
    }

    function contactSupplier(link, productName) {
      tg.showAlert(`✅ تم فتح التواصل مع مزود ${productName}`);
      tg.openLink(link);
    }

    // اضغط Enter للبحث
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') searchProduct();
    });
  </script>
</body>
</html>
