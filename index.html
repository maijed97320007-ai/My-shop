<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>صورة المنتج - رفع وبحث</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; margin:0; background:#121212; color:#fff; }
    .header { background:#1f1f1f; padding:15px; text-align:center; font-size:20px; font-weight:700; }
    .upload-area { padding:20px; text-align:center; border:2px dashed #0088cc; border-radius:16px; margin:15px; background:#1f1f1f; }
    input[type="file"] { display:none; }
    .preview { max-width:100%; max-height:300px; border-radius:12px; margin:10px 0; }
    button { width:100%; padding:15px; margin:10px 0; background:#0088cc; color:#fff; border:none; border-radius:12px; font-size:18px; font-weight:600; }
    .results { padding:15px; }
    .card { background:#1f1f1f; border-radius:16px; margin-bottom:15px; overflow:hidden; }
    .card img { width:100%; height:220px; object-fit:cover; }
    .card-body { padding:15px; }
    .title { font-size:18px; font-weight:600; }
    .rating { color:#ffcc00; }
    .price { font-size:22px; color:#00ff9d; font-weight:700; }
    .supplier { background:#2a2a2a; padding:10px; border-radius:8px; margin-top:10px; display:flex; justify-content:space-between; align-items:center; }
    .contact-btn { background:#00ff9d; color:#000; padding:8px 16px; border-radius:8px; font-weight:700; }
  </style>
</head>
<body>
  <div class="header">📸 صورة المنتج • رفع + بحث</div>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <p>اضغط هنا لرفع صورة المنتج 📤</p>
    <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)">
    <img id="preview" class="preview" style="display:none;">
  </div>

  <div style="padding:0 20px;">
    <input type="text" id="productName" placeholder="اسم المنتج (اختياري)" style="width:100%; padding:12px; border-radius:12px; background:#2a2a2a; color:#fff; border:none;">
    <button onclick="searchWithImage()">🔍 ابحث عن المنتج</button>
    <button onclick="openReverseSearch()" style="background:#ff8800;">🌐 بحث عكسي في Google Lens / Bing</button>
  </div>

  <div id="results" class="results"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let uploadedImageUrl = '';

    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('preview').src = ev.target.result;
        document.getElementById('preview').style.display = 'block';
        uploadedImageUrl = ev.target.result; // base64 للعرض فقط
        tg.showAlert('✅ تم رفع الصورة بنجاح');
      };
      reader.readAsDataURL(file);
    }

    async function searchWithImage() {
      const name = document.getElementById('productName').value.trim();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">جاري البحث... ⏳</div>';

      if (!name && !uploadedImageUrl) {
        resultsDiv.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">ارفع صورة أو اكتب اسم المنتج</div>';
        return;
      }

      // بحث نصي (نفس السابق مع تحسين)
      const query = name || "product";
      try {
        const res = await fetch(`https://dummyjson.com/products/search?q=${encodeURIComponent(query)}&limit=5`);
        const data = await res.json();

        if (!data.products || data.products.length === 0) {
          resultsDiv.innerHTML = `<div style="text-align:center; padding:40px;">لا نتائج، جرب اسم آخر</div>`;
          return;
        }

        let html = '';
        const suppliers = ["AliExpress", "Amazon", "مزود عماني", "Shein"];
        data.products.forEach(p => {
          const sup = suppliers[Math.floor(Math.random()*suppliers.length)];
          html += `
            <div class="card">
              <img src="${p.thumbnail}" alt="${p.title}">
              <div class="card-body">
                <div class="title">${p.title}</div>
                <div class="rating">⭐ ${p.rating}</div>
                <div class="price">$${p.price}</div>
                <div class="supplier">
                  <span>📦 ${sup}</span>
                  <span class="contact-btn" onclick="contact('${sup}', '${p.title}')">تواصل</span>
                </div>
              </div>
            </div>`;
        });
        resultsDiv.innerHTML = html;
      } catch(e) {
        resultsDiv.innerHTML = '<div style="text-align:center; padding:40px; color:#f66;">خطأ في البحث، حاول مرة أخرى</div>';
      }
    }

    function openReverseSearch() {
      if (!uploadedImageUrl) {
        tg.showAlert('ارفع صورة أولاً!');
        return;
      }
      // فتح Google Lens أو Bing مع الصورة (base64 ليس مثاليًا، لكن يمكن نسخ الرابط يدويًا)
      tg.showAlert('سيتم فتح البحث العكسي...\nيمكنك لصق الصورة في Google Lens أو Bing Visual Search');
      // بديل: افتح نافذة لـ Google Images
      tg.openLink('https://www.google.com/imghp');
    }

    function contact(supplier, product) {
      tg.showAlert(`جاري فتح التواصل مع ${supplier} لمنتج: ${product}`);
      // يمكنك تغيير الروابط حسب مزوديك الحقيقيين
      tg.openLink('https://t.me/OmanSupplier2026'); // مثال
    }
  </script>
</body>
</html>
